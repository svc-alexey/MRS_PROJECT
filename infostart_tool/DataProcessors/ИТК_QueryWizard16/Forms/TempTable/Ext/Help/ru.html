<h1>Временная таблица</h1>
<div>Для использования временной таблицы следует нажать кнопку<b> Создать описание временной таблицы</b>. </div>
<div>В отобразившейся форме ввести имя таблицы, имена нужных полей и, при необходимости, указать тип значения полей.<br></div>
